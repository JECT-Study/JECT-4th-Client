name: Jira 이슈 → GitHub 이슈 자동 생성

on:
  repository_dispatch:
    types: [jira-issue-created]

jobs:
  create-github-issue:
    name: GitHub 이슈 생성
    runs-on: ubuntu-latest

    steps:
      - name: GitHub 이슈 생성 및 Jira 링크 추가
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          JIRA_ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          JIRA_ISSUE_SUMMARY: ${{ github.event.client_payload.issue_summary }}
          JIRA_ISSUE_URL: ${{ github.event.client_payload.issue_url }}
          JIRA_ISSUE_TYPE: ${{ github.event.client_payload.issue_type }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "[$JIRA_ISSUE_KEY] $JIRA_ISSUE_SUMMARY" \
            --arg body "## Jira 이슈

          - **이슈 키**: $JIRA_ISSUE_KEY
          - **유형**: $JIRA_ISSUE_TYPE
          - **Jira 링크**: $JIRA_ISSUE_URL" \
            '{
              "title": $title,
              "body": $body
            }')

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -H "Authorization: token $GH_PAT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "201" ]; then
            echo "GitHub 이슈 생성 실패"
            exit 1
          fi
